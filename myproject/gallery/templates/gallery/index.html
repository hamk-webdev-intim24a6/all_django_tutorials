<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* ── CSS custom properties ── */
    :root[data-theme="light"] {
      --bg: #ffffff;
      --bg-card: #f5f5f5;
      --text: #1a1a1a;
      --text-secondary: #4a4a4a;
      --border: #d1d1d1;
      --link: #0044cc;
      --link-visited: #6b2fa0;
      --link-hover: #002a80;
      --link-visited-hover: #4a1a75;
      --toggle-bg: #e0e0e0;
      --toggle-knob: #ffffff;
      --toggle-icon: "☀️";
      --shadow: rgba(0, 0, 0, 0.1);
      --focus-ring: #0044cc;
    }
    :root[data-theme="dark"] {
      --bg: #121212;
      --bg-card: #1e1e1e;
      --text: #e8e8e8;
      --text-secondary: #b0b0b0;
      --border: #3a3a3a;
      --link: #6eb5ff;
      --link-visited: #cea5fb;
      --link-hover: #a0d0ff;
      --link-visited-hover: #e0c8ff;
      --toggle-bg: #3a3a3a;
      --toggle-knob: #121212;
      --toggle-icon: "🌙";
      --shadow: rgba(0, 0, 0, 0.4);
      --focus-ring: #6eb5ff;
    }

    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Links – WCAG 2.1 AA contrast ── */
    a { color: var(--link); text-decoration: underline; }
    a:visited { color: var(--link-visited); }
    a:hover, a:focus { color: var(--link-hover); }
    a:visited:hover, a:visited:focus { color: var(--link-visited-hover); }
    a:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .theme-toggle-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    .toggle-switch {
      position: relative;
      width: 52px;
      height: 28px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--toggle-bg);
      border-radius: 28px;
      transition: background 0.3s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      bottom: 3px;
      background: var(--toggle-knob);
      border-radius: 50%;
      transition: transform 0.3s;
      box-shadow: 0 1px 3px var(--shadow);
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(24px);
    }
    .toggle-switch input:focus-visible + .toggle-slider {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    /* ── Upload link ── */
    .actions {
      padding: 1rem 1.5rem 0;
    }

    /* ── Gallery grid ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      padding: 1.25rem 1.5rem 2rem;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: box-shadow 0.2s, background 0.3s, border-color 0.3s;
    }
    .card:hover {
      box-shadow: 0 4px 12px var(--shadow);
    }
    .card img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }
    .card-body {
      padding: 0.75rem 1rem;
    }
    .card-body p {
      font-size: 0.9375rem;
      color: var(--text);
    }
    .card-body time {
      display: block;
      margin-top: 0.25rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
      font-size: 1.125rem;
    }

    /* ── Responsive: 2 cols on tablet, 1 col on phone ── */
    @media (max-width: 900px) {
      .gallery { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 540px) {
      .gallery {
        grid-template-columns: 1fr;
        padding: 1rem;
        gap: 1rem;
      }
      .header {
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .header h1 { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>Gallery New</h1>
    <div class="theme-toggle">
      <span class="theme-toggle-label" id="toggle-label">Light</span>
      <label class="toggle-switch">
        <input type="checkbox" id="theme-switch" aria-label="Toggle dark mode">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </header>

  <div class="actions">
    <a href="{% url 'gallery:image_upload' %}">Upload more images</a>
  </div>

  <main class="gallery">
    {% for post in posts %}
    <article class="card">
      <img src="{{ post.image.url }}" alt="{{ post.description }}" loading="lazy">
      <div class="card-body">
        <p>{{ post.description }}</p>
        <time datetime="{{ post.pub_date|date:'Y-m-d' }}">{{ post.pub_date|date:'N j, Y' }}</time>
      </div>
    </article>
    {% empty %}
    <p class="empty-msg">No images yet. Be the first to upload one!</p>
    {% endfor %}
  </main>

  <script>
    (function () {
      var sw = document.getElementById('theme-switch');
      var label = document.getElementById('toggle-label');
      var root = document.documentElement;

      function applyTheme(dark) {
        root.setAttribute('data-theme', dark ? 'dark' : 'light');
        sw.checked = dark;
        label.textContent = dark ? 'Dark' : 'Light';
      }

      // Restore saved preference, fallback to OS preference
      var saved = localStorage.getItem('theme');
      if (saved) {
        applyTheme(saved === 'dark');
      } else {
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
      }

      sw.addEventListener('change', function () {
        var dark = sw.checked;
        applyTheme(dark);
        localStorage.setItem('theme', dark ? 'dark' : 'light');
      });
    })();
  </script>

</body>
</html>
